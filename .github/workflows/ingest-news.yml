name: Ingest News

on:
  schedule:
    # Every 3 hours (UTC). GitHub Actions cron is free for public repos.
    - cron: '0 */3 * * *'
  # Allows manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger news ingestion
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "x-ingest-secret: ${{ secrets.INGEST_SECRET }}" \
            "${{ secrets.VERCEL_URL }}/api/news/ingest")
          echo "HTTP status: $response"
          if [ "$response" != "200" ]; then
            echo "Ingest returned non-200 status: $response"
            exit 1
          fi
